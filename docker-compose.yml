services:
  airfare-monitor:
    build: .
    container_name: airfare-monitor
    ports:
      - "8100:8100"
    volumes:
      - ./data:/app/data
    environment:
      AIRFARE_DB_PATH: /app/data/airfare.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8100/').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
