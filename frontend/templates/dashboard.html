{% extends "base.html" %}
{% block content %}
<div class="container">
    <h1>Airfare Monitor</h1>
    <div class="dashboard-controls">
        <button class="refresh-all-btn"
                hx-post="/refresh-all"
                hx-target="body"
                hx-swap="innerHTML"
                hx-indicator="#refresh-spinner">
            Refresh All
        </button>
        <span id="refresh-spinner" class="htmx-indicator">Refreshing...</span>
        <a href="/monitor" class="monitor-link">Monitor</a>
    </div>
    {% include "partials/add_form.html" %}
    <div id="tracker-list">
        {% include "partials/tracker_list.html" %}
    </div>
</div>
<script>
    function applyFilteredPrices() {
        document.querySelectorAll(".tracker-card").forEach(function (card) {
            var m = card.id.match(/^card-(\d+)$/);
            if (!m) return;
            var priceEl = card.querySelector(".best-price");
            var tag = card.querySelector(".filtered-tag");
            if (!priceEl) return;
            try {
                var raw = localStorage.getItem("filteredBest_" + m[1]);
                if (!raw) { if (tag) tag.style.display = "none"; return; }
                var data = JSON.parse(raw);
                if (data.filtered && data.price !== null) {
                    priceEl.textContent = data.currency + Math.round(data.price);
                    if (tag) tag.style.display = "";
                } else {
                    if (tag) tag.style.display = "none";
                }
            } catch (e) {}
        });
    }
    document.addEventListener("DOMContentLoaded", applyFilteredPrices);
    document.addEventListener("htmx:afterSwap", applyFilteredPrices);
</script>
{% endblock %}
