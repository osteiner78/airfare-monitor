{% macro airline_logo(flight_number, name) %}{% set code = flight_number | airline_code %}{% if code %}<span class="airline-logo-wrap" title="{{ name }}"><img class="airline-logo" src="https://images.kiwi.com/airlines/64/{{ code }}.png" alt="{{ name }}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"><span class="airline-fallback" style="display:none">{{ name or code }}</span></span>{% else %}{{ name or "—" }}{% endif %}{% endmacro %}
