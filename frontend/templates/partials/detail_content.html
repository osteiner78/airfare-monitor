<div id="detail-content">
    {% if latest_snapshot %}
    <div class="chart-section">
        <h2>Price History</h2>
        <div class="chart-container">
            <canvas id="price-chart"></canvas>
        </div>
    </div>

    <div class="results-section">
        <div class="results-header">
            <h2>Current Results</h2>
                <button class="search-now-btn"
                        hx-post="/trackers/{{ tracker.id }}/search"
                        hx-target="#detail-content"
                        hx-swap="outerHTML"
                        hx-indicator="#search-spinner">
                    Search Now
                </button>
            <span id="search-spinner" class="htmx-indicator">Searching...</span>
        </div>
        {% include "partials/results_table.html" %}
    </div>
    {% else %}
    <div class="empty-state" style="padding: 2rem 0;">
        <p>No snapshots yet. Click "Search Now" to fetch flight data.</p>
        <button class="search-now-btn"
                hx-post="/trackers/{{ tracker.id }}/search"
                hx-target="#detail-content"
                hx-swap="innerHTML"
                hx-indicator="#search-spinner">
            Search Now
        </button>
        <span id="search-spinner" class="htmx-indicator">Searching...</span>
    </div>
    {% endif %}
</div>

<script>window.chartData = {{ chart_datasets | safe }};</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4"></script>
<script src="/static/charts.js"></script>
